apiVersion: platform.internal/v1
kind: System

metadata:
  name: super-excel
  title: Super Excel
  description: Portal operacional do produto Super Excel

spec:
  owner: excellaratordev
  lifecycle: production
  providers:
    github:
      connection: github-superexcel
      repositories:
        - name: excel
          fullName: excellaratordev/excel
          defaultBranch: main
    render:
      connection: render-superexcel
      services:
        - name: frontend-backend
          serviceId: srv-d9bvddm7r5hc73bjnrf0
          plan: free
    supabase:
      connection: supabase-superexcel
      projects:
        - name: main
          projectRef: REPLACE_ME
          plan: free
  healthChecks:
    - name: backend
      url: https://example.com/REPLACE_ME/health
      expectedStatus: 200
  documentation:
    repositoryReadme: README.md
