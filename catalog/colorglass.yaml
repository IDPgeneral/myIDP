apiVersion: platform.internal/v1
kind: System

metadata:
  name: colorglass
  title: ColorGlass
  description: Portal operacional do produto ColorGlass

spec:
  owner: ricardosiqueirarf-hash
  lifecycle: production
  providers:
    github:
      connection: github-colorglass
      repositories:
        - name: ricardosiqueirarf.github.io
          fullName: ricardosiqueirarf-hash/ricardosiqueirarf.github.io
          defaultBranch: main
    render:
      connection: render-colorglass
      services:
        - name: frontend
          serviceId: srv-d5n9aihr0fns73ff0ifg
          plan: free
        - name: backend
          serviceId: srv-d566stbe5dus73cjo690
          plan: free
    supabase:
      connection: supabase-colorglass
      projects:
        - name: main
          projectRef: hfhwvzldhgqniqnurync
          plan: free
  healthChecks:
    - name: backend
      url: https://example.com/REPLACE_ME/health
      expectedStatus: 200
  documentation:
    repositoryReadme: README.md
